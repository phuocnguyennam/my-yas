name: Shared Java Service CI
on:
  workflow_call:
    inputs:
      service_name: { required: true, type: string }
      service_path: { required: true, type: string }
      java_version: { required: false, type: string, default: '25' }
      min_coverage_overall: { required: false, type: number, default: 70 }
      docker_image: { required: false, type: string, default: '' }
    secrets:
      SONAR_TOKEN: { required: true }
      SNYK_TOKEN: { required: true }

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  packages: write

jobs:
  gitleaks-scan-service:
    name: Gitleaks Scan Service Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Gitleaks on Service Files
        uses: ./.github/workflows/actions/gitleaks-scan
        with:
          source_path: ${{ inputs.service_path }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-${{ inputs.service_path }}

  snyk-dependency-scan:
    name: Snyk SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Security Scan
        uses: ./.github/workflows/actions/snyk-security-scan
        with:
          service_path: ${{ inputs.service_path }}
          manifest_file: ${{ inputs.service_path }}/pom.xml
          snyk_token: ${{ secrets.SNYK_TOKEN }}
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup & Build
        uses: ./.github/workflows/actions/java-setup-build-test
        with:
          java_version: ${{ inputs.java_version }}
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}

      - name: Java Code Quality
        uses: ./.github/workflows/actions/java-static-analysis
        with:
          service_path: ${{ inputs.service_path }}
          service_name: ${{ inputs.service_name }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          min_coverage_overall: ${{ inputs.min_coverage_overall }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/target/
          if-no-files-found: error

  docker-publish:
    name: Docker Publish & Scan
    needs: [build-and-test]
    # CHANGED: removed the "main or PR only" restriction.
    # Requirement (mục 3): EVERY branch must get an image built + pushed
    # on every commit, tagged with that branch's last commit id.
    # We still skip docker-publish entirely if the caller didn't pass an image name.
    if: ${{ inputs.docker_image != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/target/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch-safe tag
        id: branch_tag
        shell: bash
        run: |
          # Turn refs/heads/dev_tax_service -> dev_tax_service
          # Sanitize slashes (feature/x -> feature-x) since Docker tags can't contain '/'
          RAW_BRANCH="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.branch_tag.outputs.safe_branch }}-${{ steps.branch_tag.outputs.short_sha }},enable=${{ github.event_name != 'pull_request' }}
            type=sha,format=short
            type=ref,event=pr

      - name: Build and Push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service_path }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Snyk Container Scan
        uses: ./.github/workflows/actions/snyk-container-scan
        continue-on-error: true
        with:
          image_name: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:${{ steps.branch_tag.outputs.safe_branch }}-${{ steps.branch_tag.outputs.short_sha }}
          snyk_token: ${{ secrets.SNYK_TOKEN }}
          service_path: ${{ inputs.service_path }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk-container-${{ inputs.service_name }}