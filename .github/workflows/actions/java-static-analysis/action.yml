name: Java Static Analysis
description: Run Checkstyle, SonarQube and JaCoCo
inputs:
  service_path:
    description: Path to the service directory
    required: true
  service_name:
    description: Name of the service
    required: true
  sonar_token:
    description: SonarQube authentication token
    required: true
  github_token:
    description: GitHub authentication token
    required: true
  min_coverage_overall:
    description: Minimum overall code coverage required
    required: true
  min_coverage_changed:
    description: Minimum code coverage for changed code
    required: true
  sonar_organization:
    description: SonarCloud Organization
    required: false
    default: "phuocnguyennam"
  sonar_project_key:
    description: SonarCloud Project Key
    required: false
    default: "phuocnguyennam_my-yas"

runs:
  using: "composite"
  steps:
    - name: Run Checkstyle Analysis
      run: |
        mvn compile checkstyle:checkstyle \
          -pl ${{ inputs.service_path }} -am \
          -Dcheckstyle.output.file=${{ inputs.service_path }}-checkstyle-result.xml \
          -DskipTests \
          -B -ntp
      shell: bash

    - name: Parse and Report Checkstyle Results
      uses: jwgmeligmeyling/checkstyle-github-action@master
      with:
        path: '**/${{ inputs.service_path }}-checkstyle-result.xml'

    - name: Run SonarQube Scanner
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      run: |
        mvn sonar:sonar \
          -pl ${{ inputs.service_path }} -am \
          -Dsonar.organization=${{ inputs.sonar_organization }} \
          -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ inputs.sonar_token }} \
          -Dsonar.coverage.jacoco.xmlReportPaths=${{ github.workspace }}/${{ inputs.service_path }}/target/site/jacoco/jacoco.xml \
          -DskipTests \
          -Drevision=1.0-SNAPSHOT \
          -B -ntp
      shell: bash

    - name: Generate and Comment JaCoCo Coverage Report
      uses: madrapps/jacoco-report@v1.6.1
      with:
        paths: ${{ github.workspace }}/${{ inputs.service_path }}/target/site/jacoco/jacoco.xml
        token: ${{ inputs.github_token }}
        min-coverage-overall: ${{ inputs.min_coverage_overall }}
        min-coverage-changed-files: ${{ inputs.min_coverage_changed }}
        title: '${{ inputs.service_name }} Coverage Report'
        update-comment: true

    - name: Enforce coverage threshold
      shell: bash
      run: |
        OVERALL=$(python3 - <<'EOF'
        import xml.etree.ElementTree as ET
        import os
        path = '${{ github.workspace }}/${{ inputs.service_path }}/target/site/jacoco/jacoco.xml'
        if not os.path.exists(path):
            print("0.00")
            exit(0)
        tree = ET.parse(path)
        root = tree.getroot()
        for counter in root.findall('counter'):
            if counter.get('type') == 'INSTRUCTION':
                missed  = int(counter.get('missed'))
                covered = int(counter.get('covered'))
                total   = missed + covered
                pct     = (covered / total * 100) if total > 0 else 0
                print(f"{pct:.2f}")
                break
        EOF
        )
        echo "Overall instruction coverage: ${OVERALL}%"
        MIN=${{ inputs.min_coverage_overall }}
        PASS=$(awk -v val="$OVERALL" -v min="$MIN" 'BEGIN { print (val >= min) ? "yes" : "no" }')
        if [ "$PASS" = "no" ]; then
          echo "Coverage ${OVERALL}% is below required ${MIN}%"
          exit 1
        else
          echo "Coverage ${OVERALL}% passed threshold ${MIN}%"
        fi