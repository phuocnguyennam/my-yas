name: CI

on:
  push:
    branches: [ "**" ]      # CHANGED: was ["main", "dev"] — now ALL branches trigger CI
                            # Requirement (mục 3): "mỗi branch của user tạo, sau khi
                            # user commit code thay đổi, bạn phải build ra một image"
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  packages: write

jobs:
  filter-changes:
    name: Filter Changed Paths
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter-root.outputs.root }}
      services: ${{ steps.filter-services.outputs.changes }}
      frontend: ${{ steps.filter-frontend.outputs.changes }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Filter Root Changes
        uses: dorny/paths-filter@v3
        id: filter-root
        with:
          filters: |
            root:
              - '*'
              - '.*'
              - '.github/workflows/**'

      - name: Filter Frontend Changes
        id: filter-frontend
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backoffice:
              - 'backoffice/**'
            storefront:
              - 'storefront/**'


      - name: Filter Service Changes
        uses: dorny/paths-filter@v3
        id: filter-services
        with:
          # Add new services to this list when needed
          filters: |
            backoffice-bff:
              - 'backoffice-bff/**'
              - 'pom.xml'
            cart:
              - 'cart/**'
              - 'pom.xml'
            customer:
              - 'customer/**'
              - 'pom.xml'
            inventory:
              - 'inventory/**'
              - 'pom.xml'
            location:
              - 'location/**'
              - 'pom.xml'
            media:
              - 'media/**'
              - 'pom.xml'
            order:
              - 'order/**'
              - 'pom.xml'
            payment:
              - 'payment/**'
              - 'pom.xml'
            payment-paypal:
              - 'payment-paypal/**'
              - 'pom.xml'
            product:
              - 'product/**'
              - 'pom.xml'
            promotion:
              - 'promotion/**'
              - 'pom.xml'
            rating:
              - 'rating/**'
              - 'pom.xml'
            recommendation:
              - 'recommendation/**'
              - 'pom.xml'
            sampledata:
              - 'sampledata/**'
              - 'pom.xml'
            search:
              - 'search/**'
              - 'pom.xml'
            storefront-bff:
              - 'storefront-bff/**'
              - 'pom.xml'
            tax:
              - 'tax/**'
              - 'pom.xml'
            webhook:
              - 'webhook/**'
              - 'pom.xml'

  # Scan root files with gitleaks
  gitleaks-scan-root:
    needs: filter-changes
    name: Gitleaks Scan Root Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Target Folder
        if: ${{ needs.filter-changes.outputs.root == 'true' }}
        run: |
          mkdir -p root_files
          find . -maxdepth 1 -type f -exec cp {} root_files/ \;

      - name: Run Gitleaks on Root Files
        if: ${{ needs.filter-changes.outputs.root == 'true' }}
        uses: ./.github/workflows/actions/gitleaks-scan
        with:
          source_path: root_files

  # Run CI with dynamic matrix for changed backend services
  services-ci:
    needs: filter-changes
    if: ${{ needs.filter-changes.outputs.services != '[]' && needs.filter-changes.outputs.services != '' }}
    name: Java CI for ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.filter-changes.outputs.services) }}

    uses: ./.github/workflows/shared-java-ci.yml
    with:
      service_name: ${{ matrix.service }}
      service_path: ${{ matrix.service }}
      java_version: '25'
      min_coverage_overall: 70
      docker_image: ghcr.io/phuocnguyennam/${{ matrix.service }}:${{ github.sha }}
    secrets: inherit

  # Run CI for frontend Node.js services when changed
  services-ci-node:
    needs: filter-changes
    if: ${{ needs.filter-changes.outputs.frontend != '[]' && needs.filter-changes.outputs.frontend != '' }}
    name: Node CI for ${{ matrix.service }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.filter-changes.outputs.frontend) }}

    uses: ./.github/workflows/shared-node-ci.yml
    with:
      service_name: ${{ matrix.service }}
      service_path: ${{ matrix.service }}
      min_coverage_overall: 70
      docker_image: ghcr.io/phuocnguyennam/${{ matrix.service }}:${{ github.sha }}
    secrets: inherit

  # Check final status of all triggered CI jobs
  ci-gate:
    name: CI Gate Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [filter-changes, gitleaks-scan-root, services-ci, services-ci-node]
    steps:
      - name: Check Status of All Triggered Services
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "FAILED: One or more services failed their CI checks. Please review the details above."
            exit 1
          else
            echo "PASSED: All triggered services passed their CI checks. Ready for merge."
            exit 0
          fi